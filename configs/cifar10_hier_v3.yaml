# Hierarchical ConvVAE v3 on CIFAR-10
# Fixes v2 variance escape:
#   - same top-down multi-resolution decoder as v2
#   - latent log-var clamp [-4, 0], so bottom prior/posterior sigma <= 1
#   - lower beta_bottom because KL is meaningful again
data:
  dataset: cifar10
  batch_size: 128
  pixel_range: "11"

model:
  arch: hierarchical
  version: hier_v3
  top_latent_dim: 64
  bottom_latent_channels: 64
  base_channels: 64

training:
  epochs: 150
  lr: 1.0e-3
  lr_scheduler: cosine
  lr_eta_min: 1.0e-5
  optimizer: adam
  recon_loss: mse
  lambda_pixel: 1.0
  lambda_perc: 0.005
  beta_top: 1.0
  beta_bottom: 2.0
  beta_warmup_epochs: 20
  free_bits_top: 0.0
  free_bits_bottom: 0.0
  seed: 42
